<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>贪吃蛇</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: #1a1a2e;
            color: #eee;
            font-family: Arial, sans-serif;
            overflow: hidden;
            touch-action: none;
        }
        h1 { margin-bottom: 8px; font-size: 24px; }
        #score { font-size: 18px; margin-bottom: 8px; }
        canvas {
            border: 3px solid #4a4a6a;
            background: #0f0f1a;
            display: block;
            max-width: 95vw;
            max-height: 70vh;
        }
        .controls { margin-top: 12px; color: #888; font-size: 12px; text-align: center; }
        .mobile-controls {
            display: none;
            margin-top: 15px;
            gap: 10px;
        }
        @media (max-width: 768px) {
            .mobile-controls { display: flex; }
            .controls { display: none; }
        }
        .btn {
            width: 60px;
            height: 60px;
            background: #2a2a4a;
            border: 2px solid #4a4a6a;
            border-radius: 10px;
            color: #eee;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            -webkit-user-select: none;
        }
        .btn:active { background: #3a3a5a; }
        .d-pad { display: grid; grid-template-columns: 60px 60px 60px; gap: 5px; }
        .btn-up { grid-column: 2; grid-row: 1; }
        .btn-left { grid-column: 1; grid-row: 2; }
        .btn-down { grid-column: 2; grid-row: 2; }
        .btn-right { grid-column: 3; grid-row: 2; }
    </style>
</head>
<body>
    <h1>🐍 贪吃蛇</h1>
    <div id="score">得分: 0</div>
    <canvas id="game" width="400" height="400"></canvas>
    
    <!-- 桌面端说明 -->
    <div class="controls">方向键控制 / 空格键暂停 / Enter重新开始</div>
    
    <!-- 手机端按钮 -->
    <div class="mobile-controls">
        <div class="d-pad">
            <button class="btn btn-up" onclick="setDir(0,-1)">⬆️</button>
            <button class="btn btn-left" onclick="setDir(-1,0)">⬅️</button>
            <button class="btn btn-down" onclick="setDir(0,1)">⬇️</button>
            <button class="btn btn-right" onclick="setDir(1,0)">➡️</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');

        const GRID = 20;
        const COLS = canvas.width / GRID;
        const ROWS = canvas.height / GRID;

        let snake = [];
        let food = { x: 5, y: 5 };
        let dx = 0, dy = 0;
        let nextDx = 0, nextDy = 0;
        let score = 0;
        let paused = false;
        let gameLoop = null;
        let gameStarted = false;

        // 触摸滑动相关
        let touchStartX = 0;
        let touchStartY = 0;

        function initGame() {
            snake = [
                { x: 10, y: 10 },
                { x: 9, y: 10 },
                { x: 8, y: 10 }
            ];
            dx = 1;
            nextDx = 1;
            nextDy = 0;
            score = 0;
            scoreEl.textContent = '得分: 0';
            paused = false;
            gameStarted = true;
            randomFood();
            draw();
        }

        function randomFood() {
            let valid = false;
            while (!valid) {
                food = {
                    x: Math.floor(Math.random() * COLS),
                    y: Math.floor(Math.random() * ROWS)
                };
                valid = true;
                for (let p of snake) {
                    if (p.x === food.x && p.y === food.y) {
                        valid = false;
                        break;
                    }
                }
            }
        }

        function draw() {
            ctx.fillStyle = '#0f0f1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            snake.forEach((p, i) => {
                ctx.fillStyle = i === 0 ? '#22c55e' : '#4ade80';
                ctx.fillRect(p.x * GRID + 1, p.y * GRID + 1, GRID - 2, GRID - 2);
            });

            ctx.fillStyle = '#f87171';
            ctx.beginPath();
            ctx.arc(
                food.x * GRID + GRID / 2,
                food.y * GRID + GRID / 2,
                GRID / 2 - 2,
                0,
                Math.PI * 2
            );
            ctx.fill();
        }

        function update() {
            if (paused || !gameStarted) return;

            dx = nextDx;
            dy = nextDy;

            if (dx === 0 && dy === 0) return;

            const head = { x: snake[0].x + dx, y: snake[0].y + dy };

            if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
                gameOver();
                return;
            }

            for (let i = 0; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) {
                    gameOver();
                    return;
                }
            }

            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreEl.textContent = '得分: ' + score;
                randomFood();
            } else {
                snake.pop();
            }

            draw();
        }

        function gameOver() {
            alert('游戏结束！最终得分: ' + score);
            initGame();
        }

        // 桌面端键盘控制
        document.addEventListener('keydown', e => {
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Space', 'Enter'].includes(e.code)) {
                e.preventDefault();
            }

            if (e.code === 'Space') {
                paused = !paused;
                return;
            }

            if (e.code === 'Enter') {
                initGame();
                return;
            }

            if (e.key === 'ArrowUp' && dy !== 1) { nextDx = 0; nextDy = -1; }
            else if (e.key === 'ArrowDown' && dy !== -1) { nextDx = 0; nextDy = 1; }
            else if (e.key === 'ArrowLeft' && dx !== 1) { nextDx = -1; nextDy = 0; }
            else if (e.key === 'ArrowRight' && dx !== -1) { nextDx = 1; nextDy = 0; }
        });

        // 手机端触摸滑动控制
        canvas.addEventListener('touchstart', e => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
            e.preventDefault();
        }, { passive: false });

        canvas.addEventListener('touchmove', e => {
            e.preventDefault();
        }, { passive: false });

        canvas.addEventListener('touchend', e => {
            if (!touchStartX || !touchStartY) return;
            
            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;
            
            const diffX = touchEndX - touchStartX;
            const diffY = touchEndY - touchStartY;
            
            const minSwipe = 30;
            
            if (Math.abs(diffX) > Math.abs(diffY)) {
                // 水平滑动
                if (Math.abs(diffX) > minSwipe) {
                    if (diffX > 0 && dx !== -1) { nextDx = 1; nextDy = 0; }
                    else if (diffX < 0 && dx !== 1) { nextDx = -1; nextDy = 0; }
                }
            } else {
                // 垂直滑动
                if (Math.abs(diffY) > minSwipe) {
                    if (diffY > 0 && dy !== -1) { nextDx = 0; nextDy = 1; }
                    else if (diffY < 0 && dy !== 1) { nextDx = 0; nextDy = -1; }
                }
            }
            
            touchStartX = 0;
            touchStartY = 0;
            e.preventDefault();
        }, { passive: false });

        // 手机端按钮控制
        function setDir(x, y) {
            if (x !== 0 && dx === -x) return;
            if (y !== 0 && dy === -y) return;
            nextDx = x;
            nextDy = y;
        }

        initGame();
        gameLoop = setInterval(update, 100);
    </script>
</body>
</html>
