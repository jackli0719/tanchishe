<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: #1a1a2e;
            color: #eee;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        h1 { margin-bottom: 10px; }
        #score { font-size: 20px; margin-bottom: 10px; }
        canvas {
            border: 3px solid #4a4a6a;
            background: #0f0f1a;
            display: block;
        }
        .controls { margin-top: 15px; color: #888; font-size: 14px; }
    </style>
</head>
<body>
    <h1>🐍 贪吃蛇</h1>
    <div id="score">得分: 0</div>
    <canvas id="game" width="400" height="400"></canvas>
    <div class="controls">方向键控制 / 空格键暂停 / Enter重新开始</div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');

        const GRID = 20;
        const COLS = canvas.width / GRID;
        const ROWS = canvas.height / GRID;

        let snake = [];
        let food = { x: 5, y: 5 };
        let dx = 0, dy = 0;
        let nextDx = 0, nextDy = 0; // 缓冲下一个方向，防止快速按键bug
        let score = 0;
        let paused = false;
        let gameLoop = null;
        let gameStarted = false;

        function initGame() {
            snake = [
                { x: 10, y: 10 },
                { x: 9, y: 10 },
                { x: 8, y: 10 }
            ];
            dx = 1; // 初始向右移动
            nextDx = 1;
            nextDy = 0;
            score = 0;
            scoreEl.textContent = '得分: 0';
            paused = false;
            gameStarted = true;
            randomFood();
            draw();
        }

        function randomFood() {
            let valid = false;
            while (!valid) {
                food = {
                    x: Math.floor(Math.random() * COLS),
                    y: Math.floor(Math.random() * ROWS)
                };
                valid = true;
                for (let p of snake) {
                    if (p.x === food.x && p.y === food.y) {
                        valid = false;
                        break;
                    }
                }
            }
        }

        function draw() {
            ctx.fillStyle = '#0f0f1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 画蛇身
            snake.forEach((p, i) => {
                ctx.fillStyle = i === 0 ? '#22c55e' : '#4ade80';
                ctx.fillRect(p.x * GRID + 1, p.y * GRID + 1, GRID - 2, GRID - 2);
            });

            // 画食物
            ctx.fillStyle = '#f87171';
            ctx.beginPath();
            ctx.arc(
                food.x * GRID + GRID / 2,
                food.y * GRID + GRID / 2,
                GRID / 2 - 2,
                0,
                Math.PI * 2
            );
            ctx.fill();
        }

        function update() {
            if (paused || !gameStarted) return;

            // 应用缓冲的方向
            dx = nextDx;
            dy = nextDy;

            // 如果没有移动方向，跳过
            if (dx === 0 && dy === 0) return;

            const head = { x: snake[0].x + dx, y: snake[0].y + dy };

            // 撞墙检测
            if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
                gameOver();
                return;
            }

            // 撞自己检测
            for (let i = 0; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) {
                    gameOver();
                    return;
                }
            }

            snake.unshift(head);

            // 吃食物
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreEl.textContent = '得分: ' + score;
                randomFood();
            } else {
                snake.pop();
            }

            draw();
        }

        function gameOver() {
            alert('游戏结束！最终得分: ' + score);
            initGame();
        }

        document.addEventListener('keydown', e => {
            // 阻止方向键和空格键的默认行为
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Space', 'Enter'].includes(e.code)) {
                e.preventDefault();
            }

            if (e.code === 'Space') {
                paused = !paused;
                return;
            }

            if (e.code === 'Enter') {
                initGame();
                return;
            }

            // 使用缓冲方向，防止快速按键导致的自杀
            if (e.key === 'ArrowUp' && dy !== 1) {
                nextDx = 0; nextDy = -1;
            } else if (e.key === 'ArrowDown' && dy !== -1) {
                nextDx = 0; nextDy = 1;
            } else if (e.key === 'ArrowLeft' && dx !== 1) {
                nextDx = -1; nextDy = 0;
            } else if (e.key === 'ArrowRight' && dx !== -1) {
                nextDx = 1; nextDy = 0;
            }
        });

        // 启动游戏
        initGame();
        gameLoop = setInterval(update, 100);
    </script>
</body>
</html>
