<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: #1a1a2e;
            color: #eee;
            font-family: Arial, sans-serif;
        }
        h1 { margin-bottom: 10px; }
        #score { font-size: 20px; margin-bottom: 10px; }
        canvas {
            border: 3px solid #4a4a6a;
            background: #0f0f1a;
        }
        .controls { margin-top: 15px; color: #888; font-size: 14px; }
    </style>
</head>
<body>
    <h1>🐍 贪吃蛇</h1>
    <div id="score">得分: 0</div>
    <canvas id="game" width="400" height="400"></canvas>
    <div class="controls">方向键控制 / 空格键暂停</div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');

        const GRID = 20;
        const COLS = canvas.width / GRID;
        const ROWS = canvas.height / GRID;

        let snake = [{ x: 10, y: 10 }];
        let food = { x: 15, y: 15 };
        let dx = 0, dy = 0;
        let score = 0;
        let paused = false;
        let gameLoop = null;

        function randomFood() {
            food = {
                x: Math.floor(Math.random() * COLS),
                y: Math.floor(Math.random() * ROWS)
            };
            // 确保不生成在蛇身上
            for (let p of snake) {
                if (p.x === food.x && p.y === food.y) return randomFood();
            }
        }

        function draw() {
            // 清屏
            ctx.fillStyle = '#0f0f1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 画蛇
            ctx.fillStyle = '#4ade80';
            snake.forEach((p, i) => {
                ctx.fillStyle = i === 0 ? '#22c55e' : '#4ade80';
                ctx.fillRect(p.x * GRID + 1, p.y * GRID + 1, GRID - 2, GRID - 2);
            });

            // 画食物
            ctx.fillStyle = '#f87171';
            ctx.fillRect(food.x * GRID + 2, food.y * GRID + 2, GRID - 4, GRID - 4);
        }

        function update() {
            if (paused) return;

            const head = { x: snake[0].x + dx, y: snake[0].y + dy };

            // 撞墙
            if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
                alert('游戏结束！得分: ' + score);
                reset();
                return;
            }

            // 撞自己
            for (let p of snake) {
                if (head.x === p.x && head.y === p.y) {
                    alert('游戏结束！得分: ' + score);
                    reset();
                    return;
                }
            }

            snake.unshift(head);

            // 吃食物
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreEl.textContent = '得分: ' + score;
                randomFood();
            } else {
                snake.pop();
            }

            draw();
        }

        function reset() {
            snake = [{ x: 10, y: 10 }];
            dx = 0; dy = 0;
            score = 0;
            scoreEl.textContent = '得分: 0';
            randomFood();
            draw();
        }

        document.addEventListener('keydown', e => {
            if (e.code === 'Space') {
                paused = !paused;
                return;
            }
            // 防止反向移动
            if (e.key === 'ArrowUp' && dy !== 1) { dx = 0; dy = -1; }
            if (e.key === 'ArrowDown' && dy !== -1) { dx = 0; dy = 1; }
            if (e.key === 'ArrowLeft' && dx !== 1) { dx = -1; dy = 0; }
            if (e.key === 'ArrowRight' && dx !== -1) { dx = 1; dy = 0; }
        });

        randomFood();
        draw();
        gameLoop = setInterval(update, 100);
    </script>
</body>
</html>
