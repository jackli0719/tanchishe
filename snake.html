<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>贪吃蛇 - 闯关模式</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #eee;
            font-family: 'Segoe UI', Arial, sans-serif;
            overflow: hidden;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }
        
        /* 游戏容器 */
        .game-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        h1 { 
            margin-bottom: 5px; 
            font-size: 28px; 
            text-shadow: 0 0 10px rgba(74, 222, 128, 0.5);
            letter-spacing: 2px;
        }
        
        /* 计分板 */
        .score-board {
            display: flex;
            gap: 20px;
            margin-bottom: 10px;
            font-size: 16px;
        }
        .score-item {
            background: rgba(255,255,255,0.1);
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .score-item span { color: #4ade80; font-weight: bold; }
        .high-score span { color: #fbbf24; }
        
        /* 游戏画布 */
        canvas {
            border: 3px solid #4a4a6a;
            border-radius: 8px;
            background: #0f0f1a;
            box-shadow: 0 0 30px rgba(74, 222, 128, 0.2);
        }
        
        /* 控制区域 */
        .controls-area {
            margin-top: 15px;
            width: 100%;
            max-width: 400px;
        }
        
        /* 桌面端 */
        .desktop-controls { 
            color: #888; 
            font-size: 12px; 
            text-align: center;
            margin-bottom: 10px;
        }
        
        /* 手机端方向键 */
        .mobile-controls {
            display: none;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
        }
        @media (max-width: 500px) {
            .mobile-controls { display: flex; }
            .desktop-controls { display: none; }
            h1 { font-size: 22px; }
            .score-board { font-size: 14px; gap: 10px; }
        }
        
        .d-pad {
            display: grid;
            grid-template-columns: repeat(3, 50px);
            grid-template-rows: repeat(2, 50px);
            gap: 5px;
        }
        
        .btn {
            width: 50px;
            height: 50px;
            background: linear-gradient(145deg, #2a2a4a, #1a1a3a);
            border: 2px solid #4a4a6a;
            border-radius: 12px;
            color: #eee;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.1s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .btn:active {
            transform: scale(0.95);
            background: linear-gradient(145deg, #3a3a5a, #2a2a4a);
        }
        
        /* 加速按钮 */
        .speed-btn {
            background: linear-gradient(145deg, #dc2626, #991b1b);
            border-color: #ef4444;
            font-size: 12px;
            font-weight: bold;
        }
        .speed-btn.active {
            animation: pulse 0.3s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        /* 弹窗 */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            z-index: 10;
        }
        .overlay.hidden { display: none; }
        
        .overlay h2 {
            font-size: 32px;
            margin-bottom: 20px;
            color: #4ade80;
            text-shadow: 0 0 20px rgba(74, 222, 128, 0.5);
        }
        
        .overlay p {
            font-size: 18px;
            margin-bottom: 10px;
            color: #aaa;
        }
        
        .overlay .big-score {
            font-size: 48px;
            color: #fbbf24;
            margin: 20px 0;
            text-shadow: 0 0 30px rgba(251, 191, 36, 0.5);
        }
        
        .start-btn {
            padding: 15px 40px;
            font-size: 18px;
            background: linear-gradient(145deg, #22c55e, #16a34a);
            border: none;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 4px 15px rgba(34, 197, 94, 0.4);
            transition: transform 0.2s;
        }
        .start-btn:hover { transform: scale(1.05); }
        .start-btn:active { transform: scale(0.98); }
        
        /* 关卡提示 */
        .level-up {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 36px;
            color: #fbbf24;
            text-shadow: 0 0 20px rgba(251, 191, 36, 0.8);
            animation: levelUp 1s ease-out forwards;
            pointer-events: none;
            z-index: 20;
        }
        
        @keyframes levelUp {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(0.5); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1.5); }
        }
        
        /* 暂停遮罩 */
        .paused-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 36px;
            color: #fff;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🐍 贪吃蛇</h1>
        
        <div class="score-board">
            <div class="score-item">得分: <span id="score">0</span></div>
            <div class="score-item">关卡: <span id="level">1</span></div>
            <div class="score-item high-score">最高: <span id="highScore">0</span></div>
        </div>
        
        <div style="position: relative;">
            <canvas id="game" width="400" height="400"></canvas>
            
            <!-- 开始界面 -->
            <div id="startScreen" class="overlay">
                <h2>🐍 贪吃蛇</h2>
                <p>吃到食物得分</p>
                <p>每5个食物升一级</p>
                <p>速度会越来越快!</p>
                <button class="start-btn" onclick="startGame()">开始游戏</button>
            </div>
            
            <!-- 暂停界面 -->
            <div id="pauseScreen" class="overlay hidden">
                <h2>⏸️ 暂停</h2>
                <button class="start-btn" onclick="resumeGame()">继续游戏</button>
            </div>
            
            <!-- 游戏结束界面 -->
            <div id="gameOverScreen" class="overlay hidden">
                <h2>游戏结束</h2>
                <p>最终得分</p>
                <div class="big-score" id="finalScore">0</div>
                <p>最高分: <span id="finalHighScore">0</span></p>
                <button class="start-btn" onclick="startGame()">再来一局</button>
            </div>
            
            <!-- 关卡提升提示 -->
            <div id="levelUp" class="level-up hidden">第 <span id="newLevel">2</span> 关!</div>
        </div>
        
        <div class="controls-area">
            <div class="desktop-controls">
                方向键控制 / 空格键暂停 / 长按加速
            </div>
            <div class="mobile-controls">
                <button class="btn" onclick="setDir(0,-1)">⬆️</button>
                <button class="btn speed-btn" id="speedBtn" onmousedown="setSpeed(true)" onmouseup="setSpeed(false)" ontouchstart="setSpeed(true)" ontouchend="setSpeed(false)">加速</button>
            </div>
            <div class="mobile-controls">
                <button class="btn" onclick="setDir(-1,0)">⬅️</button>
                <button class="btn" onclick="setDir(0,1)">⬇️</button>
                <button class="btn" onclick="setDir(1,0)">➡️</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        
        const GRID = 20;
        const COLS = canvas.width / GRID;
        const ROWS = canvas.height / GRID;
        const FOOD_PER_LEVEL = 5; // 每吃5个食物升一级
        
        // 游戏状态
        let snake = [];
        let food = { x: 5, y: 5 };
        let dx = 0, dy = 0;
        let nextDx = 0, nextDy = 0;
        let score = 0;
        let level = 1;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let paused = true;
        let gameRunning = false;
        let gameLoop = null;
        let speedMultiplier = 1;
        
        // 触摸相关
        let touchStartX = 0;
        let touchStartY = 0;
        let lastDirection = { x: 0, y: 0 };
        
        // 初始化显示
        document.getElementById('highScore').textContent = highScore;
        
        function initGame() {
            snake = [
                { x: 10, y: 10 },
                { x: 9, y: 10 },
                { x: 8, y: 10 }
            ];
            dx = 1;
            nextDx = 1;
            nextDy = 0;
            lastDirection = { x: 1, y: 0 };
            score = 0;
            level = 1;
            speedMultiplier = 1;
            updateUI();
            randomFood();
            draw();
        }
        
        function updateUI() {
            document.getElementById('score').textContent = score;
            document.getElementById('level').textContent = level;
            document.getElementById('highScore').textContent = highScore;
        }
        
        function randomFood() {
            let valid = false;
            while (!valid) {
                food = {
                    x: Math.floor(Math.random() * COLS),
                    y: Math.floor(Math.random() * ROWS)
                };
                valid = true;
                for (let p of snake) {
                    if (p.x === food.x && p.y === food.y) {
                        valid = false;
                        break;
                    }
                }
            }
        }
        
        function draw() {
            // 清屏
            ctx.fillStyle = '#0f0f1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 画网格线（可选装饰）
            ctx.strokeStyle = 'rgba(74, 74, 106, 0.2)';
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= COLS; i++) {
                ctx.beginPath();
                ctx.moveTo(i * GRID, 0);
                ctx.lineTo(i * GRID, canvas.height);
                ctx.stroke();
            }
            for (let i = 0; i <= ROWS; i++) {
                ctx.beginPath();
                ctx.moveTo(0, i * GRID);
                ctx.lineTo(canvas.width, i * GRID);
                ctx.stroke();
            }
            
            // 画蛇身
            snake.forEach((p, i) => {
                // 渐变色蛇身
                const gradient = ctx.createRadialGradient(
                    p.x * GRID + GRID/2, p.y * GRID + GRID/2, 0,
                    p.x * GRID + GRID/2, p.y * GRID + GRID/2, GRID/2
                );
                if (i === 0) {
                    gradient.addColorStop(0, '#4ade80');
                    gradient.addColorStop(1, '#22c55e');
                } else {
                    gradient.addColorStop(0, '#86efac');
                    gradient.addColorStop(1, '#4ade80');
                }
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.roundRect(p.x * GRID + 1, p.y * GRID + 1, GRID - 2, GRID - 2, 4);
                ctx.fill();
            });
            
            // 画食物（带闪烁效果）
            const time = Date.now() / 200;
            const pulse = 1 + Math.sin(time) * 0.1;
            ctx.fillStyle = '#f87171';
            ctx.beginPath();
            ctx.arc(
                food.x * GRID + GRID / 2,
                food.y * GRID + GRID / 2,
                (GRID / 2 - 2) * pulse,
                0,
                Math.PI * 2
            );
            ctx.fill();
            
            // 食物光晕
            ctx.shadowColor = '#f87171';
            ctx.shadowBlur = 10;
            ctx.fill();
            ctx.shadowBlur = 0;
        }
        
        function update() {
            if (paused || !gameRunning) return;
            
            // 应用缓冲方向
            dx = nextDx;
            dy = nextDy;
            lastDirection = { x: dx, y: dy };
            
            if (dx === 0 && dy === 0) return;
            
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };
            
            // 撞墙
            if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
                gameOver();
                return;
            }
            
            // 撞自己
            for (let i = 0; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) {
                    gameOver();
                    return;
                }
            }
            
            snake.unshift(head);
            
            // 吃食物
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                
                // 检查升级
                const newLevel = Math.floor(score / (10 * FOOD_PER_LEVEL)) + 1;
                if (newLevel > level) {
                    level = newLevel;
                    showLevelUp();
                    // 升级时稍微增加速度
                    speedMultiplier = Math.min(2.5, 1 + (level - 1) * 0.15);
                    // 立即更新游戏速度
                    startGameLoop();
                }
                
                // 更新最高分
                if (score > highScore) {
                    highScore = score;
                    localStorage.setItem('snakeHighScore', highScore);
                }
                
                updateUI();
                randomFood();
            } else {
                snake.pop();
            }
            
            draw();
        }
        
        function showLevelUp() {
            const el = document.getElementById('levelUp');
            document.getElementById('newLevel').textContent = level;
            el.classList.remove('hidden');
            setTimeout(() => el.classList.add('hidden'), 1000);
        }
        
        function gameOver() {
            gameRunning = false;
            clearInterval(gameLoop);
            document.getElementById('finalScore').textContent = score;
            document.getElementById('finalHighScore').textContent = highScore;
            document.getElementById('gameOverScreen').classList.remove('hidden');
        }
        
        function startGame() {
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.add('hidden');
            document.getElementById('pauseScreen').classList.add('hidden');
            
            initGame();
            gameRunning = true;
            startGameLoop();
        }
        
        function startGameLoop() {
            if (gameLoop) clearInterval(gameLoop);
            const baseSpeed = 120;
            const speed = baseSpeed / speedMultiplier;
            gameLoop = setInterval(update, speed);
        }
        
        function pauseGame() {
            if (!gameRunning) return;
            paused = true;
            document.getElementById('pauseScreen').classList.remove('hidden');
        }
        
        function resumeGame() {
            paused = false;
            document.getElementById('pauseScreen').classList.add('hidden');
        }
        
        // 键盘控制
        document.addEventListener('keydown', e => {
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Space'].includes(e.code)) {
                e.preventDefault();
            }
            
            if (e.code === 'Space') {
                if (gameRunning && !paused) pauseGame();
                else if (paused) resumeGame();
                else startGame();
                return;
            }
            
            if (!gameRunning) return;
            
            if (e.key === 'ArrowUp' && lastDirection.y !== 1) {
                nextDx = 0; nextDy = -1;
            } else if (e.key === 'ArrowDown' && lastDirection.y !== -1) {
                nextDx = 0; nextDy = 1;
            } else if (e.key === 'ArrowLeft' && lastDirection.x !== 1) {
                nextDx = -1; nextDy = 0;
            } else if (e.key === 'ArrowRight' && lastDirection.x !== -1) {
                nextDx = 1; nextDy = 0;
            }
            
            // 长按加速
            if (e.shiftKey || e.code === 'ShiftLeft') {
                speedMultiplier = 2;
                startGameLoop();
            }
        });
        
        document.addEventListener('keyup', e => {
            if (e.shiftKey || e.code === 'ShiftLeft') {
                speedMultiplier = Math.max(1, 1 + (level - 1) * 0.15);
                startGameLoop();
            }
        });
        
        // 触摸控制
        canvas.addEventListener('touchstart', e => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
            e.preventDefault();
        }, { passive: false });
        
        canvas.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
        
        canvas.addEventListener('touchend', e => {
            if (!touchStartX || !touchStartY || !gameRunning) return;
            
            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;
            const diffX = touchEndX - touchStartX;
            const diffY = touchEndY - touchStartY;
            const minSwipe = 30;
            
            if (Math.abs(diffX) > Math.abs(diffY)) {
                if (Math.abs(diffX) > minSwipe) {
                    if (diffX > 0 && lastDirection.x !== -1) {
                        nextDx = 1; nextDy = 0;
                    } else if (diffX < 0 && lastDirection.x !== 1) {
                        nextDx = -1; nextDy = 0;
                    }
                }
            } else {
                if (Math.abs(diffY) > minSwipe) {
                    if (diffY > 0 && lastDirection.y !== -1) {
                        nextDx = 0; nextDy = 1;
                    } else if (diffY < 0 && lastDirection.y !== 1) {
                        nextDx = 0; nextDy = -1;
                    }
                }
            }
            
            touchStartX = 0;
            touchStartY = 0;
            e.preventDefault();
        }, { passive: false });
        
        // 手机端按钮控制
        function setDir(x, y) {
            if (!gameRunning) return;
            if (x !== 0 && lastDirection.x === -x) return;
            if (y !== 0 && lastDirection.y === -y) return;
            nextDx = x;
            nextDy = y;
        }
        
        function setSpeed(isSpeedUp) {
            const btn = document.getElementById('speedBtn');
            if (isSpeedUp) {
                speedMultiplier = 2;
                btn.classList.add('active');
                startGameLoop();
            } else {
                speedMultiplier = Math.max(1, 1 + (level - 1) * 0.15);
                btn.classList.remove('active');
                startGameLoop();
            }
        }
        
        // 初始绘制
        draw();
    </script>
</body>
</html>
